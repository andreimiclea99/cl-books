// Render
const booksContainer = document.getElementById('books');
const searchInput = document.getElementById('search');
const episodeFilter = document.getElementById('episodeFilter');
const statsEl = document.getElementById('stats');

// Populate episode filter
const episodes = [...new Set(books.map(b => b.episode))].sort((a, b) => a - b);
episodes.forEach(ep => {
  const book = books.find(b => b.episode === ep);
  const opt = document.createElement('option');
  opt.value = ep;
  opt.textContent = `#${ep} - ${book.episodeTitle.substring(0, 50)}${book.episodeTitle.length > 50 ? '...' : ''}`;
  episodeFilter.appendChild(opt);
});

function renderBooks() {
  const query = searchInput.value.toLowerCase();
  const epFilter = episodeFilter.value;

  let filtered = books.filter(b => {
    const matchSearch = !query || b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query);
    const matchEp = !epFilter || b.episode === parseInt(epFilter);
    return matchSearch && matchEp;
  });

  statsEl.textContent = `${filtered.length} cărți din ${books.length} total`;

  // Group by episode
  const grouped = {};
  filtered.forEach(b => {
    if (!grouped[b.episode]) grouped[b.episode] = { title: b.episodeTitle, books: [] };
    grouped[b.episode].books.push(b);
  });

  let html = '';
  Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b)).forEach(ep => {
    const group = grouped[ep];
    html += `<div class="episode-header">#${ep} &middot; ${group.title}</div>`;
    group.books.forEach(book => {
      const searchQuery = encodeURIComponent(`${book.title} ${book.author}`);
      html += `
        <div class="book-card">
          <div class="book-cover" id="cover-${book.episode}-${book.title.substring(0,10).replace(/\s/g,'')}">
            <div class="placeholder">📖</div>
          </div>
          <div class="book-info">
            <div class="book-episode">Episodul #${book.episode}</div>
            <div class="book-title">${book.title}</div>
            <div class="book-meta">
              <span>✍️ ${book.author}</span>
              <span>📅 ${book.year}</span>
            </div>
            <div class="book-description">${book.description}</div>
          </div>
        </div>`;
    });
  });

  booksContainer.innerHTML = html;
  loadCovers(filtered);
}

async function loadCovers(booksList) {
  for (const book of booksList) {
    try {
      const q = encodeURIComponent(`${book.title} ${book.author}`);
      const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
      const data = await res.json();
      if (data.items && data.items[0]?.volumeInfo?.imageLinks?.thumbnail) {
        const imgUrl = data.items[0].volumeInfo.imageLinks.thumbnail.replace('http://', 'https://');
        const coverId = `cover-${book.episode}-${book.title.substring(0,10).replace(/\s/g,'')}`;
        const coverEl = document.getElementById(coverId);
        if (coverEl) {
          coverEl.innerHTML = `<img src="${imgUrl}" alt="${book.title}" loading="lazy">`;
        }
      }
    } catch (e) {
      // Keep placeholder
    }
  }
}

searchInput.addEventListener('input', renderBooks);
episodeFilter.addEventListener('change', renderBooks);

renderBooks();
